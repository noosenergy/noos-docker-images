name: base
channels:
  - conda-forge
dependencies:
  - nodejs>14 # Needed to have a newer version of nodejs for `jupyter lab build`
  # metapackages
  - nomkl
  # enforcing numpy 1.*
  - numpy<2.0
  # z2jh setup
  - notebook
  - jupyterlab
  - jupyterhub
  # plotting
  - matplotlib
  - plotly
  - dash<3.0
  - ipywidgets
  - ipykernel
  # extensions
  - jupyterlab_pygments
  - jupyter-server-proxy
  - jupyterlab-git
  - jupyterlab_templates
  # - jupyterlab-code-snippets  # Not compatible with jupyterlab>=4
  # updating cryptography
  - pyopenssl
  # extras
  - pip
  - pip:
      - dash-material-components>=2.0.8
      - fsspec[s3]>=2024.6.1
      - jupyterlab-spreadsheet-editor
      - jupyter-ai
      - langchain-openai # Needed for jupyter-ai OpenAI models
      - langchain-anthropic # Needed for jupyter-ai Anthropic models
      - marimo
      - marimo-jupyter-extension
      - altair>=6.0.0
      - ruff>=0.14.11
      - python-lsp-ruff>=2.3.0
      - python-lsp-server>=1.14.0
      - polars>=1.38.1
