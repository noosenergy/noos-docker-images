[save]
format_on_save = true

[runtime]
auto_instantiate = true
on_cell_change = "autorun"
output_max_bytes = 20_000_000

[formatting]
line_length = 99

[language_servers.pylsp]
enable_pyflakes = false
enabled = true
enable_mypy = true
enable_flake8 = false
enable_ruff = true
enable_pydocstyle = false
enable_pylint = false

[package_management]
manager = "uv"
